# MandiPulse India recommendation configuration.

transport_cost:
  cost_per_km_per_quintal: 4.0
  road_distance_factor: 1.3
  max_transport_radius_km: 500

ranking:
  uncertainty_penalty_weight: 0.3
  max_alternatives: 10

risk_thresholds:
  low_max_interval_pct: 10
  high_min_interval_pct: 25

sensitivity:
  enabled: true
  transport_cost_variation_pct: 20

